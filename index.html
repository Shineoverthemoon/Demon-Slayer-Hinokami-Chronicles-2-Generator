<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Demon Slayer: Hinokami Chronicles 2 — Battle Generator</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Inter:wght@400;500;600&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{--fire:#E8420A;--water:#1A90FF;--gold:#F0C040;--dark:#080608;--panel:#0D0A0E;--card:#13101A;--border:#221828;--text:#F0EAF8;--dim:#5A5060;}
body{background:var(--dark);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:28px 14px 72px;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 50% 30% at 10% 5%,rgba(232,66,10,0.08) 0%,transparent 70%),radial-gradient(ellipse 40% 25% at 90% 90%,rgba(26,144,255,0.06) 0%,transparent 70%);pointer-events:none;z-index:0;}
.header{text-align:center;position:relative;z-index:1;margin-bottom:6px;}
.title{font-family:'Cinzel',serif;font-size:clamp(1.2rem,4.5vw,2.2rem);font-weight:900;letter-spacing:0.06em;line-height:1.2;color:var(--text);text-shadow:0 0 30px rgba(232,66,10,0.3);}
.title .accent{color:var(--fire);}
.subtitle{font-size:0.68rem;letter-spacing:0.22em;text-transform:uppercase;color:var(--dim);margin-top:5px;}
.card{background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:22px 18px;width:100%;max-width:800px;position:relative;z-index:1;margin-top:22px;}
.filter-row{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:18px;}
.pill{font-size:0.67rem;letter-spacing:0.1em;text-transform:uppercase;padding:5px 11px;border-radius:20px;border:1px solid var(--border);background:#0A0810;color:var(--dim);cursor:pointer;transition:all 0.12s;}
.pill:hover{border-color:var(--fire);color:var(--text);}
.pill.active{background:var(--fire);border-color:var(--fire);color:#fff;}
.pill.demon.active{background:#6B0FBB;border-color:#6B0FBB;}
.pill.dlc.active{background:#B8860B;border-color:#B8860B;}
.btn-wrap{display:flex;justify-content:center;}
.btn-gen{font-family:'Cinzel',serif;font-size:1rem;font-weight:700;letter-spacing:0.1em;background:linear-gradient(135deg,#E8420A,#A01800);color:#fff;border:none;border-radius:8px;padding:13px 40px;cursor:pointer;transition:transform 0.12s,box-shadow 0.15s;}
.btn-gen:hover{transform:scale(1.04);box-shadow:0 0 22px rgba(232,66,10,0.4);}
.btn-gen:active{transform:scale(0.97);}
#result{display:none;flex-direction:column;gap:14px;margin-top:20px;}
.teams-row{display:grid;grid-template-columns:1fr 44px 1fr;align-items:center;}
.fighter-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:18px 14px;display:flex;flex-direction:column;align-items:center;gap:6px;text-align:center;}
.fc-owner{font-size:0.6rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--dim);}
.fc-name{font-family:'Cinzel',serif;font-size:clamp(0.85rem,2.8vw,1.2rem);font-weight:700;letter-spacing:0.04em;color:var(--text);line-height:1.2;}
.fc-tag{font-size:0.62rem;letter-spacing:0.12em;text-transform:uppercase;padding:3px 8px;border-radius:10px;}
.fc-tag.slayer{background:rgba(232,66,10,0.15);color:var(--fire);}
.fc-tag.demon{background:rgba(107,15,187,0.2);color:#B060FF;}
.fc-tag.hashira{background:rgba(240,192,64,0.15);color:var(--gold);}
.vs-col{display:flex;align-items:center;justify-content:center;}
.vs-badge{font-family:'Cinzel',serif;font-size:1.2rem;font-weight:900;color:var(--gold);text-shadow:0 0 10px rgba(240,192,64,0.4);}
.scenario-box{background:var(--card);border:1px solid var(--border);border-left:3px solid var(--fire);border-radius:10px;padding:16px 14px;}
.scenario-label{font-size:0.6rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--fire);margin-bottom:8px;font-weight:600;}
.scenario-text{font-size:0.86rem;line-height:1.65;color:#C0B0CC;}
.cursor{display:inline-block;width:2px;height:0.85em;background:var(--fire);margin-left:2px;vertical-align:text-bottom;animation:blink 0.7s steps(1) infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:0;}}

/* ── TTS button ── */
.tts-btn{
  display:inline-flex;align-items:center;gap:6px;
  background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);
  border-radius:20px;padding:6px 14px;cursor:pointer;
  font-size:0.7rem;letter-spacing:0.1em;text-transform:uppercase;
  color:#AAA;transition:all 0.15s;margin-top:10px;
  -webkit-tap-highlight-color:transparent;user-select:none;
}
.tts-btn:hover{background:rgba(255,255,255,0.1);color:#FFF;border-color:rgba(255,255,255,0.25);}
.tts-btn.playing{color:#FFD700;border-color:rgba(255,215,0,0.4);background:rgba(255,215,0,0.08);}
.tts-btn.loading{opacity:0.6;cursor:wait;}
</style>
</head>
<body>
<div class="header">
  <div class="title">Demon Slayer<br><span class="accent">Hinokami Chronicles 2</span></div>
  <div class="subtitle">1v1 Battle Generator — Joe vs CPU</div>
</div>
<div class="card">
  <div class="filter-row">
    <div class="pill active" data-filter="all">All</div>
    <div class="pill" data-filter="slayer">Demon Slayers</div>
    <div class="pill" data-filter="hashira">Hashira</div>
    <div class="pill demon" data-filter="demon">Demons</div>
    <div class="pill" data-filter="main">Main Cast</div>
    <div class="pill dlc" data-filter="dlc">Infinity Castle DLC</div>
  </div>
  <div class="btn-wrap">
    <button class="btn-gen" id="genBtn">🔥 GENERATE BATTLE</button>
  </div>
  <div id="result">
    <div class="teams-row">
      <div class="fighter-card">
        <div class="fc-owner">Joe plays</div>
        <div class="fc-name" id="nameJoe">—</div>
        <div class="fc-tag" id="tagJoe"></div>
      </div>
      <div class="vs-col"><div class="vs-badge">VS</div></div>
      <div class="fighter-card">
        <div class="fc-owner">CPU plays</div>
        <div class="fc-name" id="nameCpu">—</div>
        <div class="fc-tag" id="tagCpu"></div>
      </div>
    </div>
    <div class="scenario-box">
      <div class="scenario-label">🌸 Battle Scenario</div>
      <div class="scenario-text" id="scenarioText"></div>
      <button class="tts-btn" id="ttsBtn" style="display:none" onclick="(function(b){const t=document.getElementById(\'scenarioText\');speakScenario(b,t.innerText);})(this)">🔊 Read Aloud</button>
    </div>
  </div>
</div>
<script>
const ALL = [
  // Tanjiro forms
  {n:"Tanjiro Kamado",t:["slayer","main"],role:"slayer"},{n:"Tanjiro Kamado (Hinokami Kagura)",t:["slayer","main"],role:"slayer"},{n:"Tanjiro Kamado (Entertainment District)",t:["slayer","main"],role:"slayer"},{n:"Tanjiro Kamado (Swordsmith Village)",t:["slayer","main"],role:"slayer"},
  // Academy Tanjiro
  {n:"Tanjiro (Kimetsu Academy)",t:["slayer","main"],role:"slayer"},
  // Nezuko forms
  {n:"Nezuko Kamado",t:["demon","main"],role:"demon"},{n:"Nezuko (Advanced Demon Form)",t:["demon","main"],role:"demon"},{n:"Nezuko (Kimetsu Academy)",t:["demon","main"],role:"demon"},
  // Zenitsu
  {n:"Zenitsu Agatsuma",t:["slayer","main"],role:"slayer"},{n:"Zenitsu (Entertainment District)",t:["slayer","main"],role:"slayer"},{n:"Zenitsu (Kimetsu Academy)",t:["slayer","main"],role:"slayer"},
  // Inosuke
  {n:"Inosuke Hashibira",t:["slayer","main"],role:"slayer"},{n:"Inosuke (Entertainment District)",t:["slayer","main"],role:"slayer"},{n:"Inosuke (Kimetsu Academy)",t:["slayer","main"],role:"slayer"},
  // Genya
  {n:"Genya Shinazugawa",t:["slayer"],role:"slayer"},
  // Early slayers
  {n:"Sabito",t:["slayer"],role:"slayer"},{n:"Makomo",t:["slayer"],role:"slayer"},{n:"Sakonji Urokodaki",t:["slayer"],role:"slayer"},{n:"Murata",t:["slayer"],role:"slayer"},
  // Support trio
  {n:"Hinatsuru Makio and Suma",t:["slayer"],role:"slayer"},{n:"Yushiro and Tamayo",t:["demon"],role:"demon"},
  // Yoriichi
  {n:"Yoriichi Type Zero",t:["slayer"],role:"slayer"},
  // All 9 Hashira
  {n:"Giyu Tomioka",t:["slayer","hashira"],role:"hashira"},{n:"Giyu (Kimetsu Academy)",t:["slayer","hashira"],role:"hashira"},{n:"Shinobu Kocho",t:["slayer","hashira"],role:"hashira"},{n:"Shinobu (Kimetsu Academy)",t:["slayer","hashira"],role:"hashira"},{n:"Kyojuro Rengoku",t:["slayer","hashira"],role:"hashira"},{n:"Rengoku (Kimetsu Academy)",t:["slayer","hashira"],role:"hashira"},{n:"Tengen Uzui",t:["slayer","hashira"],role:"hashira"},{n:"Tengen (Kimetsu Academy)",t:["slayer","hashira"],role:"hashira"},{n:"Muichiro Tokito",t:["slayer","hashira"],role:"hashira"},{n:"Mitsuri Kanroji",t:["slayer","hashira"],role:"hashira"},{n:"Obanai Iguro",t:["slayer","hashira"],role:"hashira"},{n:"Sanemi Shinazugawa",t:["slayer","hashira"],role:"hashira"},{n:"Gyomei Himejima",t:["slayer","hashira"],role:"hashira"},
  // Demons - base game
  {n:"Rui",t:["demon"],role:"demon"},{n:"Akaza",t:["demon"],role:"demon"},{n:"Yahaba",t:["demon"],role:"demon"},{n:"Susamaru",t:["demon"],role:"demon"},{n:"Yahaba and Susamaru",t:["demon"],role:"demon"},{n:"Enmu",t:["demon"],role:"demon"},
  // Entertainment District demons
  {n:"Daki",t:["demon"],role:"demon"},{n:"Gyutaro",t:["demon"],role:"demon"},{n:"Daki and Gyutaro",t:["demon"],role:"demon"},
  // Swordsmith Village demons
  {n:"Gyokko",t:["demon"],role:"demon"},{n:"Zohakuten",t:["demon"],role:"demon"},
  // Free DLC
  {n:"Muzan Kibutsuji",t:["demon"],role:"demon"},
  // Infinity Castle DLC
  {n:"Kaigaku",t:["demon","dlc"],role:"demon"},{n:"Zenitsu (Infinity Castle)",t:["slayer","main","dlc"],role:"slayer"},{n:"Akaza (Infinity Castle)",t:["demon","dlc"],role:"demon"},{n:"Tanjiro (Infinity Castle)",t:["slayer","main","dlc"],role:"slayer"},{n:"Giyu (Infinity Castle)",t:["slayer","hashira","dlc"],role:"hashira"},{n:"Shinobu (Infinity Castle)",t:["slayer","hashira","dlc"],role:"hashira"},{n:"Doma",t:["demon","dlc"],role:"demon"},
];

const SCENARIOS = [
  "Muzan has issued a direct command forcing {B} to hunt down {A}. They've crossed paths in a burning village and now Muzan's blood curse is forcing the confrontation whether either wants it or not.",
  "The Wisteria Forest maze has collapsed inward after a brutal demon attack, sealing both fighters inside a corridor with no exit. {A} was tracking a mark. {B} was hunting prey. They found each other instead.",
  "The Butterfly Estate's records were stolen, containing every active slayer's current mission. A demon used that intel to set a trap — and it worked perfectly. {A} walked straight into it, with {B} waiting on the other side.",
  "A Demon Blood Art has rewritten the memory of everyone in the immediate area, making {A} and {B} appear to each other as the enemy they most fear. The illusion is perfect. Until one of them lands a hit that breaks the other's concentration, they're fighting what they see.",
  "The train is moving. Enmu's Sleep Blood Demon Art is pulling both {A} and {B} into a shared dreamscape where injuries carry over when you wake. Both fighters have to destroy the other's spiritual core to break free.",
  "Upper Moon Three has offered a demon's territory to any demon who can defeat the strongest slayer in this district. {B} accepted. {A} showed up at the same coordinates through a mission scroll. A signal flare will bring Hashira backup in fifteen minutes.",
  "The Swordsmith Village has been breached. In the chaos of the demon invasion, a Blood Demon Art has scattered both fighters into the forge tunnels beneath the mountain. The tunnels are collapsing.",
  "Shinobu's Wisteria-laced poison has been aerosolized across an entire district as a containment measure. {B} tracked {A} into the cloud thinking they were weakened. They were wrong. Now they're both deep in the fog.",
  "The Flame Breathing scroll has resurfaced — the original manuscript before it was split into nine Forms. Both {A} and {B} received the same mission to retrieve it. The corps sent them independently without telling either the other was coming.",
  "Inside the Infinity Castle, the corridors have been rearranged by Nakime's Blood Demon Art into an inescapable loop. {A} and {B} have been circling each other for twenty minutes. The loop won't break until someone wins.",
  "The Demon Slayer Corps has issued an emergency order — eliminate the demon who has been turning slayers against each other using a Confusion Blood Demon Art. The problem is the Art is already active. {A} and {B} are both convinced the other is the corrupted slayer.",
  "Kagaya Ubuyashiki issued a mission scroll that contained a test hidden inside the actual mission. The test is a battle between two corps members to evaluate their synchronization under hostile conditions. Neither {A} nor {B} was told they were being tested.",
  "The Moon Breathing technique left an echo in this location. The echo activates when two combatants with sufficient bloodlust enter the radius simultaneously. {A} and {B} both entered from different directions without knowing the echo was here.",
  "Akaza was hunting. The hunt brought him to the same forest as a demon slayer on a mission. That demon slayer is {A}. The other fighter is {B}, who arrived to support {A} and found Akaza had already fled — leaving two equally battle-ready combatants in the same clearing with nowhere else to direct their focus.",
  "The Upper Moon meeting was interrupted. Two fighters are alive who shouldn't be, and Muzan has issued simultaneous kill orders for both of them. The kill orders were sent to different demons who happen to be in the same location. The demons are {B}. The targets include {A}. And also each other.",
  "Tanjiro's Hinokami Kagura has awakened a dormant memory in the demon bloodline — a fragment of a slayer technique so old it predates the current Breathing styles. {A} can feel the resonance. {B} can feel it tearing at their consciousness. The memory only unlocks if one of them forces the other to their absolute limit.",
  "A demon who has lived for over a thousand years placed memory-sealing traps throughout the forest. Any combatant who trips one loses the memory of why they came here. {A} and {B} have both tripped a trap. Neither remembers their mission. Both remember how to fight.",
  "The Water Breathing dojo has a training protocol that activates when a student and a demon reach the same clearing simultaneously. The protocol doesn't distinguish between sanctioned and unsanctioned encounters. The doors sealed behind both of them.",
  "Kokushibo's Moon Breathing echoes persist for days after he fights in a location. The resonance amplifies aggression in anyone who enters the area and has a high enough Total Concentration. {A} and {B} both entered at full concentration.",
  "Gyomei's prayer beads contain a fragment of a centuries-old seal. When the seal detects two combatants at peak fighting intent within twenty meters of each other, it activates and confines them until the intent is resolved through combat. The beads are on the ground between {A} and {B}.",
  "The poison has spread further than anyone knew. It's in the soil of this entire district, activating when demon blood contacts it. {B} is bleeding. The soil is activating. The reaction pulls every demon slayer in range toward the source. {A} is the first to arrive.",
  "Doma's Blood Demon Art left frozen particles suspended in the air across a three-kilometer radius. The particles remain active indefinitely. They respond to specific breathing patterns — inhale-hold-exhale sequences characteristic of Total Concentration Breathing — and begin attacking the source. Both fighters are using it. The particles are attacking both of them. Fighting each other is less dangerous than fighting the particles alone.",
  "The Slayer Corps archives contain a record of every demon ever defeated. One demon on the list was never confirmed destroyed. It's in this location. Both {A} and {B} were sent to confirm the kill. The demon is also here, watching from the shadows, waiting to see which of the two fighters is stronger before it decides which one to take first.",
  "Rui's web threads don't fully dissolve after the spider demon dies. The threads remain as spiritual tripwires that activate when someone with a demon's ki-signature touches them. {B} touched one. The thread activated and pulled {A} into the same physical space as a target to be eliminated.",
  "An ancient breathing style technique — one that predates the Breath of the Sun — has been discovered in a buried temple. The technique requires two practitioners to execute it, but it also requires them to fight to near-death first to awaken the dormant muscle memory. {A} and {B} are the only practitioners present.",
  "The Butterfly Estate's medical poison cabinet was raided. Whoever took the poison left evidence pointing to {A}. {B} has been dispatched to bring {A} in for questioning. {A} didn't take the poison and has no intention of being brought in peacefully. The real thief is somewhere behind {B}, watching.",
  "Night has fallen faster than either fighter expected. The demon's regeneration accelerates after midnight. The slayer's vision is perfect in the dark. These advantages cancel each other out and leave only technique.",
  "Three demon slayers went missing in this sector over the past month. {A} was sent to investigate. {B} was the last person to see each of the missing slayers before they disappeared. The Demon Slayer Corps doesn't have enough information to know if {B} is a threat or a witness. {A} has been told to treat them as a threat until proven otherwise.",
  "The totality of the Sun Breathing technique is being reconstituted across multiple Breathing Style descendants. When two descendants come into close proximity while using their techniques simultaneously, the resonance pulls them into an involuntary battle that tests which aspect of the original technique is stronger.",
  "Muzan is watching. He's always watching. He sent {B} specifically because {A}'s bloodline is the one he fears. He wants to know how strong that fear needs to be. The fight is his intelligence gathering. Neither fighter knows they're the experiment.",
];

const ROLE_LABELS={slayer:'Demon Slayer',demon:'Demon',hashira:'Hashira'};
const ROLE_CLASS={slayer:'slayer',demon:'demon',hashira:'hashira'};
let activeFilter='all';
document.querySelectorAll('.pill').forEach(p=>{p.addEventListener('click',()=>{document.querySelectorAll('.pill').forEach(x=>x.classList.remove('active'));p.classList.add('active');activeFilter=p.dataset.filter;});});
function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function getPool(){return activeFilter==='all'?ALL:ALL.filter(c=>c.t.includes(activeFilter));}
function typewrite(el,text,speed=16){el.innerHTML='';let i=0;const cur=document.createElement('span');cur.className='cursor';el.appendChild(cur);const tick=()=>{if(i<text.length){el.insertBefore(document.createTextNode(text[i++]),cur);setTimeout(tick,speed);}else{cur.remove();}};tick();}
document.getElementById('genBtn').addEventListener('click',()=>{
  const pool=getPool();
  if(pool.length<2){alert('Not enough fighters. Try All.');return;}
  const s=shuffle(pool);
  const f1=s[0], f2=s.find(c=>c.n!==f1.n);
  if(!f2){alert('Need at least 2 fighters. Try All.');return;}
  const [joe,jack]=Math.random()<0.5?[f1,f2]:[f2,f1];
  document.getElementById('nameJoe').textContent=joe.n;
  document.getElementById('nameCpu').textContent=jack.n;
  const tj=document.getElementById('tagJoe');tj.textContent=ROLE_LABELS[joe.role];tj.className='fc-tag '+ROLE_CLASS[joe.role];
  const tk=document.getElementById('tagCpu');tk.textContent=ROLE_LABELS[jack.role];tk.className='fc-tag '+ROLE_CLASS[jack.role];
  document.getElementById('result').style.display='flex';
  document.getElementById('ttsBtn').style.display='inline-flex';
  const t=SCENARIOS[Math.floor(Math.random()*SCENARIOS.length)];
  typewrite(document.getElementById('scenarioText'),t.replace(/\{A\}/g,joe.n).replace(/\{B\}/g,jack.n));
});
</script>

<script>
// ── TTS (OpenAI Nova via proxy) ───────────────────────────
const TTS_URL = 'https://tts-proxy-i1sn.onrender.com';
let ttsAudio = null;

async function speakScenario(btn, text) {
  // iOS audio unlock MUST happen synchronously before any await
  if (!ttsAudio) {
    ttsAudio = new Audio();
    ttsAudio.play().catch(()=>{});
    ttsAudio.pause();
  }

  // stop if already playing
  if (ttsAudio && !ttsAudio.paused) {
    ttsAudio.pause();
    ttsAudio.currentTime = 0;
    btn.textContent = '🔊 Read Aloud';
    btn.classList.remove('playing');
    return;
  }

  // get the actual rendered text from the DOM right now
  const el = document.getElementById('scenarioText');
  const actualText = (el ? (el.innerText || el.textContent) : text).trim();

  if (!actualText || actualText.length < 5) {
    btn.textContent = '⏳ Still generating...';
    setTimeout(() => { btn.textContent = '🔊 Read Aloud'; }, 1500);
    return;
  }

  btn.textContent = '⏳ Loading...';
  btn.classList.add('loading');
  btn.disabled = true;

  try {
    const r = await fetch(TTS_URL + '/tts', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({text: actualText})
    });
    if (!r.ok) throw new Error('Server error ' + r.status);
    const data = await r.json();
    if (data.error) throw new Error(data.error);

    ttsAudio.src = TTS_URL + data.path;
    ttsAudio.onended = () => {
      btn.textContent = '🔊 Read Aloud';
      btn.classList.remove('playing');
    };
    await ttsAudio.play();
    btn.textContent = '⏹ Stop';
    btn.classList.remove('loading');
    btn.classList.add('playing');
  } catch(e) {
    console.error('TTS error:', e);
    btn.textContent = '🔊 Read Aloud';
    btn.classList.remove('loading','playing');
    alert('TTS error: ' + e.message);
  } finally {
    btn.disabled = false;
  }
}
</script>
</body>
</html>
